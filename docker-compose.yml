services:
  findwallet:
    build: .
    restart: always
    volumes:
      - ./output.txt:/app/output.txt # Persist output file
      - ./.env:/app/.env # Mount environment variables
      - ./index.js:/app/index.js # Live code — no rebuild needed
      - ./service:/app/service   # Live code — no rebuild needed
    environment:
      - NODE_ENV=production
      - WORKER_THREADS=true # Enable worker threads
    # Scale horizontally: docker-compose up --scale findwallet=4 -d
    # Each container runs 4+ worker threads = high parallelism
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1024M
